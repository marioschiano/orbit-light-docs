site_name: Orbit Light Documentation
site_url: https://marioschiano.github.io/orbit-light-docs/

theme:
  name: material
  language: it
  icon:
    alternate: material/earth
  palette:
    scheme: slate
    primary: amber
    accent: orange

plugins:
  - search
  - i18n:
      docs_structure: folder
      languages:
        - locale: it
          name: Italiano
          default: true
          build: true
        - locale: en
          name: English
          build: true
          nav_translations:
            Home: Home
            Perche Orbit Light: Why Orbit Light
            Per iniziare: Getting Started
            Installazione: Installation
            Guida rapida: Quick Start
            Workflow: Workflow
            Workflow manuale: Manual Workflow
            HDRI Environment: HDRI Environment
            Shortcut e rotazione: Shortcuts and Rotation
            Inspection e controlli materiale: Inspection and Material Controls
            Riferimento: Reference
            Riferimento impostazioni: Settings Reference
            Consigli export: Export Tips
            Supporto: Support
            FAQ: FAQ
            Risoluzione problemi: Troubleshooting
            Video Tutorials: Video Tutorials
            Changelog: Changelog

markdown_extensions:
  - admonition
  - md_in_html

extra_css:
  - stylesheets/orbit-light.css

extra:
  alternate:
    - name: Italiano
      link: /orbit-light-docs/
      lang: it
    - name: English
      link: /orbit-light-docs/en/
      lang: en

nav:
  - Home: index.md
  - Perche Orbit Light: why-orbit-light.md
  - Per iniziare:
      - Installazione: installation.md
      - Guida rapida: quick-start.md
  - Workflow:
      - Workflow manuale: workflow.md
      - HDRI Environment: hdri-environment.md
      - Shortcut e rotazione: shortcuts.md
      - Inspection e controlli materiale: material-maps.md
  - Riferimento:
      - Riferimento impostazioni: settings-reference.md
      - Consigli export: export-tips.md
  - Supporto:
      - FAQ: faq.md
      - Risoluzione problemi: troubleshooting.md
      - Video Tutorials: video-tutorials.md
      - Changelog: changelog.md
      - Supporto: support.md
