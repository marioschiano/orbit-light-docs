site_name: Orbit Light Documentation
site_url: https://marioschiano.github.io/orbit-light-docs/

theme:
  name: material
  language: it
  palette:
    scheme: slate
    primary: amber
    accent: orange

plugins:
  - search

markdown_extensions:
  - admonition
  - md_in_html

extra_css:
  - stylesheets/orbit-light.css

extra:
  alternate:
    - name: Italiano
      link: /orbit-light-docs/it/
      lang: it
    - name: English
      link: /orbit-light-docs/en/
      lang: en

nav:
  - Scegli lingua: index.md
  - Italiano:
      - Home: it/index.md
      - Perche Orbit Light: it/why-orbit-light.md
      - Per iniziare:
          - Installazione: it/installation.md
          - Guida rapida: it/quick-start.md
      - Workflow:
          - Workflow manuale: it/workflow.md
          - HDRI Environment: it/hdri-environment.md
          - Shortcut e rotazione: it/shortcuts.md
          - Material Maps: it/material-maps.md
      - Riferimento:
          - Riferimento impostazioni: it/settings-reference.md
          - Consigli export: it/export-tips.md
      - Supporto:
          - FAQ: it/faq.md
          - Risoluzione problemi: it/troubleshooting.md
          - Video Tutorials: it/video-tutorials.md
          - Changelog: it/changelog.md
          - Supporto: it/support.md
  - English:
      - Coming soon: en/index.md
